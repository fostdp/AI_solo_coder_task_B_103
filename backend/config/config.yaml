server:
  port: 8080
  mode: debug

influxdb:
  addr: http://localhost:8086
  username: admin
  password: admin@2024
  database: ancient_wood_monitor
  precision: s
  write_queue_size: 4096
  write_max_retries: 3

lora:
  data_endpoint: /api/v1/lora/data
  device_count: 90
  udp_addr: ":5678"

alert:
  acoustic_event_threshold: 100
  moisture_threshold: 25.0
  wechat_webhook_url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your-key
  sms_api_url: https://sms.example.com/send
  sms_api_key: your-sms-api-key

fumigation:
  default_release_rate: 5.0
  wind_speed: 2.0
  wind_direction: 0
  stability_class: D

model:
  lstm_path: ./models/lstm_weights.json
  lstm_input_size: 8
  lstm_hidden_size: 32
  lstm_output_size: 1

pipeline:
  buffer_size: 4096
  lora_ingest:
    expected_items: 100000
    false_positive_rate: 0.001
    cache_ttl: 24h
    max_cache_size: 50000
  termite_lstm:
    ewma_acoustic_alpha: 0.3
    ewma_moisture_alpha: 0.25
    ewma_max_history: 96
    spike_threshold_sigma: 2.5
    consecutive_confirm: 2
    prediction_hours: 24
  fumigant_diffusion:
    default_release_rate: 5.0
    default_wind_speed: 2.0
    default_wind_direction: 0
    stability_class: D
    grid_resolution: 0.5
    grid_size_x: 20
    grid_size_y: 20
    grid_size_z: 12
    exposure_time_hours: 1.0
  alerter:
    acoustic_threshold: 100.0
    moisture_threshold: 25.0
    cooldown_period: 10m
    enable_wechat: false
    enable_sms: false

tdoa:
  sound_speed_wood: 3300.0
  min_sensors: 4
  node_merge_distance: 0.5
  edge_max_distance: 3.0
  max_nodes_per_building: 100

strength:
  reference_density: 450.0
  critical_energy: 50000.0
  required_safety_factor: 1.5
  depth_ratio_default: 0.3
  default_wood_type: pine

particle_filter:
  min_particles: 50
  max_particles: 500
  initial_particles: 100
  prediction_horizon: 24h
  release_lead_time: 1h
  process_noise: 0.1
  measurement_noise: 0.05
  resample_threshold: 0.5
  ess_increase_threshold: 0.5
  ess_decrease_threshold: 0.9

bird_deterrent:
  radar_scan_interval: 30s
  woodpecker_threshold: 3
  deterrent_duration: 10m
  cooldown_period: 30m
  enable_ultrasonic: true
  enable_predator_call: true
  simulation_speed: 1.0
