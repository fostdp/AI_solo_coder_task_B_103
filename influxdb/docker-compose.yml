version: '3.8'

services:
  influxdb:
    image: influxdb:1.8.10
    container_name: ancient-wood-influxdb
    ports:
      - "8086:8086"
      - "8083:8083"
    volumes:
      - ./influxdb.conf:/etc/influxdb/influxdb.conf:ro
      - ./data:/var/lib/influxdb
      - ./init.iql:/docker-entrypoint-initdb.d/init.iql
    environment:
      - INFLUXDB_DB=ancient_wood_monitor
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin@2024
    restart: unless-stopped
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
