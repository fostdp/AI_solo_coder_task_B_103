global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ancient-wood-monitor'

rule_files:

alerting:

scrape_configs:
  - job_name: 'backend'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/metrics'

  - job_name: 'simulator'
    scrape_interval: 10s
    static_configs:
      - targets: ['simulator:8081']
    metrics_path: '/metrics'

  - job_name: 'backend-pprof'
    scrape_interval: 30s
    static_configs:
      - targets: ['backend:6060']
    metrics_path: '/debug/pprof/profile'
